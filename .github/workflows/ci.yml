name: CI
on: [push, pull_request]
jobs:
  backend:
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: backend}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install -q -r requirements.txt
      - run: python -m compileall -q app tests scripts
      - name: Run pytest
        run: |
          set -o pipefail
          pytest -x -vv 2>&1 | tee pytest.log
      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-pytest-log
          path: backend/pytest.log
      - name: Production preflight
        env:
          APP_ENV: production
          DATABASE_URL: postgresql+psycopg://inventory:test@localhost/inventory
          JWT_SECRET: 0123456789abcdef0123456789abcdef
          BOOTSTRAP_OWNER_PASSWORD: strong-ci-password
          CORS_ORIGINS: '["https://inventory.example.com"]'
        run: |
          set -o pipefail
          python scripts/production_preflight.py 2>&1 | tee preflight.log
      - name: Upload preflight log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-preflight-log
          path: backend/preflight.log
      - run: alembic upgrade head --sql > /tmp/migration.sql
      - run: pip check
  frontend:
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: frontend}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: "20"}
      - run: npm install --silent
      - name: Audit frontend dependencies
        run: |
          set -o pipefail
          npm audit --audit-level=high 2>&1 | tee npm-audit.log
      - name: Upload npm audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-npm-audit-log
          path: frontend/npm-audit.log
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
